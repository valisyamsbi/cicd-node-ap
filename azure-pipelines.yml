trigger:
- main

pool:
  name: 'Default'

variables:
  node_version: '18.x'

steps:

- task: NodeTool@0
  inputs:
    versionSpec: '$(node_version)'
  displayName: 'Install Node.js'

- script: |
    npm install
  displayName: 'Install dependencies'

- script: |
    npm test
  displayName: 'Run tests'

- script: |
    npm run build
  displayName: 'Build app'
  continueOnError: true
